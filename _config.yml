# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# ----------------------------
# Basic Site Settings
# ----------------------------
locale                   : "en-US"
site_theme               : "default" # options: default, air, sunrise, mint, dirt, contrast
title                    : "Junjie Wu / Academic Homepage"
title_separator          : "-"
name                     : &name "Junjie Wu"
description              : &description "Junjie Wu's academic portfolio — School of Computing, Southwest Jiaotong University"
url                      : "https://rmisgod.github.io/jjw.github.io"
baseurl                  : ""
repository               : "jjw-swjtu/jjw-swjtu.github.io"

# ----------------------------
# Site Author (Sidebar)
# ----------------------------
author:
  # Biographic information
  avatar           : "images/jjw.png"   # ✅ 放在 /images/jjw.png
  name             : "Junjie Wu"
  pronouns         : "he/him"
  bio              : "Postdoctoral Researcher in Computer Science at Southwest Jiaotong University."
  location         : "Chengdu, China"
  employer         : "Southwest Jiaotong University"
  uri              : "https://rmisgod.github.io/jjw.github.io/"
  email            : "jjw@swjtu.edu.cn"

  # Academic profiles
  googlescholar    : "https://scholar.google.com/citations?user=luEfZkQAAAAJ&hl=zh-CN"
  orcid            : "https://orcid.org/yourorcidurl"
  pubmed           : "https://www.ncbi.nlm.nih.gov/pubmed/?term=john+snow"

  # Repositories
  github           : "jjw-swjtu"

  # Social media
  bluesky          : "bsky.app"
  linkedin         : "junjie-wu-swjtu"

# ----------------------------
# Publication Categories
# ----------------------------
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# ----------------------------
# Site Settings
# ----------------------------
breadcrumbs              : true
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               : false

atom_feed:
  hide                   : false

# ----------------------------
# SEO & Social
# ----------------------------
social:
  type                   : "Person"
  name                   : "Junjie Wu"
  links:
    - "https://github.com/jjw-swjtu"
    - "https://orcid.org/yourorcidurl"

# ----------------------------
# Analytics
# ----------------------------
analytics:
  provider               : false

# ----------------------------
# File Handling
# ----------------------------
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ----------------------------
# Markdown
# ----------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ----------------------------
# Collections
# ----------------------------
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ----------------------------
# Defaults
# ----------------------------
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # Teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # Publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # Portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true

  # Talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ----------------------------
# Sass / CSS
# ----------------------------
sass:
  sass_dir: _sass
  style: compressed

# ----------------------------
# Permalinks & Timezone
# ----------------------------
permalink: /:categories/:title/
timezone: Asia/Shanghai   # ✅ 中国时区

# ----------------------------
# Plugins
# ----------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# ----------------------------
# Archives
# ----------------------------
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# ----------------------------
# HTML Compression
# ----------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
